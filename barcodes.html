<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bons Cadeaux — Coco Games</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem;
        }
        h1 { font-size: 1.4rem; color: #94a3b8; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { font-size: 0.85rem; color: #475569; text-align: center; margin-bottom: 1.5rem; }

        .controls {
            max-width: 500px;
            margin: 0 auto 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .row { display: flex; gap: 1rem; align-items: center; }
        label { font-size: 0.9rem; color: #94a3b8; min-width: 140px; }
        input, select {
            padding: 0.5rem 0.75rem;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 0.9rem;
            flex: 1;
        }
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-print { background: #059669; color: white; }
        .btn-print:hover { background: #047857; }
        .btn-back { background: #334155; color: #94a3b8; text-decoration: none; display: inline-block; }
        .btn-back:hover { background: #475569; }
        .btn-row { display: flex; gap: 1rem; justify-content: center; margin-top: 0.5rem; }

        /* Page A4 */
        .page {
            width: 210mm;
            margin: 1rem auto;
            background: white;
            padding: 3mm 5mm;
            display: flex;
            flex-direction: column;
            gap: 2mm;
        }

        /* Voucher = image + barcode overlay */
        .voucher {
            position: relative;
            width: 200mm;
            /* ratio 2000:700 = 2.857:1 */
            height: 70mm;
            page-break-inside: avoid;
            overflow: hidden;
        }
        .voucher img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        /* Barcode positioned over the dashed encart area */
        .barcode-overlay {
            position: absolute;
            /* Center of the encart */
            right: 1%;
            top: 50%;
            width: 14%;
            height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Rotate the whole container */
            transform: translateY(-50%) rotate(-90deg);
        }
        .barcode-overlay svg {
            display: block;
        }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .controls, h1, .subtitle { display: none !important; }
            .page {
                margin: 0 auto;
                padding: 2mm 5mm;
                box-shadow: none;
                border-radius: 0;
                page-break-after: always;
            }
            .page:last-child { page-break-after: auto; }
        }
    </style>
</head>
<body>
    <h1>Bons Cadeaux Coco Games</h1>
    <p class="subtitle">Vos bons avec codes-barres, prets a imprimer</p>

    <div class="controls">
        <div class="row">
            <label>Type de bon :</label>
            <select id="bon-type">
                <option value="1H">Bon de 1H — 1 personne</option>
                <option value="CHG">Bon de 1 chargeur</option>
            </select>
        </div>
        <div class="row">
            <label>Nombre de bons :</label>
            <input type="number" id="count" value="4" min="1" max="100">
        </div>
        <div class="row">
            <label>Prefixe :</label>
            <input type="text" id="prefix" value="CG" placeholder="ex: CG">
        </div>
        <div class="btn-row">
            <a href="index.html" class="btn btn-back">Retour au scanner</a>
            <button class="btn btn-primary" onclick="generate()">Generer les bons</button>
            <button class="btn btn-print" onclick="window.print()">Imprimer</button>
        </div>
    </div>

    <div id="pages"></div>

    <script>
        var IMAGES = {
            '1H': 'bon-1h.png',
            'CHG': 'bon-chargeur.png'
        };

        function generateCode(prefix, type, index) {
            var random = Math.random().toString(36).substring(2, 6).toUpperCase();
            var num = String(index).padStart(3, '0');
            return prefix + '-' + type + '-' + num + '-' + random;
        }

        function createVoucher(type, code) {
            var voucher = document.createElement('div');
            voucher.className = 'voucher';

            var img = document.createElement('img');
            img.src = IMAGES[type];
            img.alt = 'Bon cadeau Coco Games';
            voucher.appendChild(img);

            var overlay = document.createElement('div');
            overlay.className = 'barcode-overlay';
            var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            overlay.appendChild(svg);
            voucher.appendChild(overlay);

            JsBarcode(svg, code, {
                format: 'CODE128',
                width: 3,
                height: 120,
                displayValue: true,
                fontSize: 18,
                font: 'monospace',
                margin: 5,
                background: 'transparent',
                lineColor: '#000000'
            });

            return voucher;
        }

        function generate() {
            var type = document.getElementById('bon-type').value;
            var count = parseInt(document.getElementById('count').value) || 4;
            var prefix = document.getElementById('prefix').value.trim() || 'CG';
            var container = document.getElementById('pages');
            container.textContent = '';

            var perPage = 4;
            var totalPages = Math.ceil(count / perPage);

            for (var p = 0; p < totalPages; p++) {
                var page = document.createElement('div');
                page.className = 'page';

                var start = p * perPage;
                var end = Math.min(start + perPage, count);

                for (var i = start; i < end; i++) {
                    var code = generateCode(prefix, type, i + 1);
                    page.appendChild(createVoucher(type, code));
                }
                container.appendChild(page);
            }
        }
    </script>
</body>
</html>
