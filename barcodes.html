<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codes-barres — Bons Cadeaux Coco Games</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem;
        }
        h1 { font-size: 1.4rem; color: #94a3b8; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { font-size: 0.85rem; color: #475569; text-align: center; margin-bottom: 1.5rem; }

        .controls {
            max-width: 500px;
            margin: 0 auto 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .row { display: flex; gap: 1rem; align-items: center; }
        label { font-size: 0.9rem; color: #94a3b8; min-width: 140px; }
        input, select {
            padding: 0.5rem 0.75rem;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 0.9rem;
            flex: 1;
        }
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-print { background: #059669; color: white; }
        .btn-print:hover { background: #047857; }
        .btn-back { background: #334155; color: #94a3b8; text-decoration: none; display: inline-block; }
        .btn-back:hover { background: #475569; }
        .btn-row { display: flex; gap: 1rem; justify-content: center; margin-top: 0.5rem; }

        /* Print grid: barcode stickers sized for the dashed encart */
        .print-area {
            max-width: 210mm;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 10mm;
            display: none;
        }
        .barcode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8mm;
        }
        .barcode-sticker {
            width: 85mm;
            height: 55mm;
            border: 2px dashed #999;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            page-break-inside: avoid;
            padding: 3mm;
        }
        .barcode-sticker .type-label {
            font-size: 8pt;
            color: #1a7a3a;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2mm;
        }
        .barcode-sticker svg {
            max-width: 75mm;
        }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .controls, h1, .subtitle { display: none !important; }
            .print-area {
                display: block !important;
                box-shadow: none;
                padding: 5mm;
                border-radius: 0;
            }
            .barcode-sticker {
                border: 1px dashed #bbb;
                break-inside: avoid;
            }
        }
    </style>
</head>
<body>
    <h1>Codes-barres — Bons Cadeaux</h1>
    <p class="subtitle">Imprimez et collez dans l'encart en pointilles de vos bons</p>

    <div class="controls">
        <div class="row">
            <label>Type de bon :</label>
            <select id="bon-type">
                <option value="1H">Bon de 1H — 1 personne</option>
                <option value="CHG">Bon de 1 chargeur</option>
            </select>
        </div>
        <div class="row">
            <label>Nombre :</label>
            <input type="number" id="count" value="4" min="1" max="100">
        </div>
        <div class="row">
            <label>Prefixe :</label>
            <input type="text" id="prefix" value="CG" placeholder="ex: CG">
        </div>
        <div class="btn-row">
            <a href="index.html" class="btn btn-back">Retour au scanner</a>
            <button class="btn btn-primary" onclick="generate()">Generer</button>
            <button class="btn btn-print" onclick="window.print()">Imprimer</button>
        </div>
    </div>

    <div class="print-area" id="print-area">
        <div class="barcode-grid" id="barcode-grid"></div>
    </div>

    <script>
        function generateCode(prefix, type, index) {
            var random = Math.random().toString(36).substring(2, 6).toUpperCase();
            var num = String(index).padStart(3, '0');
            return prefix + '-' + type + '-' + num + '-' + random;
        }

        function generate() {
            var type = document.getElementById('bon-type').value;
            var count = parseInt(document.getElementById('count').value) || 4;
            var prefix = document.getElementById('prefix').value.trim() || 'CG';
            var typeLabel = type === '1H' ? 'Bon de 1H \u2014 1 personne' : 'Bon de 1 chargeur';

            var area = document.getElementById('print-area');
            var grid = document.getElementById('barcode-grid');
            area.style.display = 'block';
            grid.textContent = '';

            for (var i = 1; i <= count; i++) {
                var code = generateCode(prefix, type, i);

                var sticker = document.createElement('div');
                sticker.className = 'barcode-sticker';

                var label = document.createElement('div');
                label.className = 'type-label';
                label.textContent = typeLabel;
                sticker.appendChild(label);

                var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                sticker.appendChild(svg);
                grid.appendChild(sticker);

                JsBarcode(svg, code, {
                    format: 'CODE128',
                    width: 1.5,
                    height: 50,
                    displayValue: true,
                    fontSize: 11,
                    font: 'monospace',
                    margin: 3,
                    background: 'transparent',
                    lineColor: '#000000'
                });
            }
        }
    </script>
</body>
</html>
