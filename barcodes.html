<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bons Cadeaux — Coco Games</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 2rem;
        }
        h1 { font-size: 1.4rem; color: #94a3b8; margin-bottom: 0.5rem; text-align: center; }
        .subtitle { font-size: 0.85rem; color: #475569; text-align: center; margin-bottom: 1.5rem; }

        .controls {
            max-width: 500px;
            margin: 0 auto 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .row { display: flex; gap: 1rem; align-items: center; }
        label { font-size: 0.9rem; color: #94a3b8; min-width: 140px; }
        input, select {
            padding: 0.5rem 0.75rem;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #1e293b;
            color: #f1f5f9;
            font-size: 0.9rem;
            flex: 1;
        }
        .btn {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-print { background: #059669; color: white; }
        .btn-print:hover { background: #047857; }
        .btn-back { background: #334155; color: #94a3b8; text-decoration: none; display: inline-block; }
        .btn-back:hover { background: #475569; }
        .btn-row { display: flex; gap: 1rem; justify-content: center; margin-top: 0.5rem; }

        /* Page A4 */
        .page {
            width: 210mm;
            margin: 1rem auto;
            background: white;
            padding: 0 5mm;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Zigzag SVG separator */
        .zigzag-wrap {
            width: 100%;
            height: 7mm;
            overflow: hidden;
            line-height: 0;
        }
        .zigzag-wrap svg {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Voucher = image + barcode overlay */
        .voucher {
            position: relative;
            width: 200mm;
            height: 63mm;
            page-break-inside: avoid;
            overflow: hidden;
        }
        .voucher img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        /* Barcode encart overlaid on top-right of image */
        .barcode-encart {
            position: absolute;
            right: 2%;
            top: 8%;
            width: 12%;
            height: 84%;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.92);
        }
        .barcode-inner {
            transform: rotate(-90deg);
            transform-origin: center center;
        }
        .barcode-inner svg {
            display: block;
        }

        /* Mode étiquettes : une étiquette par page, taille configurable */
        .label-sheet {
            display: flex;
            flex-wrap: wrap;
            gap: 2mm;
            justify-content: flex-start;
            max-width: 210mm;
            margin: 1rem auto;
        }
        .label {
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1mm;
            page-break-inside: avoid;
            break-inside: avoid;
            overflow: hidden;
        }
        .label svg { display: block; max-width: 100%; max-height: 100%; }

        @media print {
            body { background: white; padding: 0; margin: 0; }
            .controls, h1, .subtitle { display: none !important; }
            .page {
                margin: 0 auto;
                padding: 0 5mm;
                box-shadow: none;
                border-radius: 0;
                page-break-after: always;
            }
            .page:last-child { page-break-after: auto; }

            .label-sheet { gap: 0; margin: 0; max-width: none; }
            .label {
                page-break-after: always;
                break-after: page;
                margin: 0;
            }
            .label:last-child { page-break-after: auto; break-after: auto; }
        }
        @page label-page {
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>Bons Cadeaux Coco Games</h1>
    <p class="subtitle">Vos bons avec codes-barres, prets a imprimer</p>

    <div class="controls">
        <div class="row">
            <label>Mode :</label>
            <select id="mode" onchange="updateModeUI()">
                <option value="full">Bon complet (A4)</option>
                <option value="labels">Codes-barres seuls (etiquettes)</option>
            </select>
        </div>
        <div class="row">
            <label>Type de bon :</label>
            <select id="bon-type">
                <option value="1H">Bon de 1H — 1 personne</option>
                <option value="2H" data-labels-only>Bon de 2H — 1 personne</option>
                <option value="6H" data-labels-only>Bon de 6H — 1 personne</option>
                <option value="12H" data-labels-only>Bon de 12H — 1 personne</option>
                <option value="DAY" data-labels-only>Day Pass — 1 personne</option>
                <option value="CHG">Bon de 1 chargeur</option>
            </select>
        </div>
        <div class="row">
            <label>Nombre de bons :</label>
            <input type="number" id="count" value="4" min="1" max="500">
        </div>
        <div class="row">
            <label>Prefixe :</label>
            <input type="text" id="prefix" value="CG" placeholder="ex: CG">
        </div>
        <div class="row label-only" style="display:none">
            <label>Largeur etiquette (mm) :</label>
            <input type="number" id="label-w" value="50" min="20" max="100">
        </div>
        <div class="row label-only" style="display:none">
            <label>Hauteur etiquette (mm) :</label>
            <input type="number" id="label-h" value="30" min="15" max="100">
        </div>
        <div class="row label-only" style="display:none">
            <label>Code de depart :</label>
            <input type="number" id="start-index" value="1" min="1">
        </div>
        <div class="btn-row">
            <a href="index.html" class="btn btn-back">Retour au scanner</a>
            <button class="btn btn-primary" onclick="generate()">Generer les bons</button>
            <button class="btn btn-print" onclick="window.print()">Imprimer</button>
            <button class="btn btn-print label-only" style="display:none;background:#7c3aed" onclick="downloadLabelsPng()">Telecharger PNG (Labelife)</button>
        </div>
    </div>

    <div id="pages"></div>

    <script>
        var IMAGES = {
            '1H': 'bon-1h.png',
            '2H': 'bon-1h.png',
            '6H': 'bon-1h.png',
            '12H': 'bon-1h.png',
            'DAY': 'bon-1h.png',
            'CHG': 'bon-chargeur.png'
        };

        var LABELS = {
            '1H': 'Bon 1H - 1 personne',
            '2H': 'Bon 2H - 1 personne',
            '6H': 'Bon 6H - 1 personne',
            '12H': 'Bon 12H - 1 personne',
            'DAY': 'Day Pass - 1 personne',
            'CHG': 'Bon 1 chargeur'
        };

        function generateCode(prefix, type, index) {
            var random = Math.random().toString(36).substring(2, 6).toUpperCase();
            var num = String(index).padStart(3, '0');
            return prefix + '-' + type + '-' + num + '-' + random;
        }

        function createZigzag() {
            var wrap = document.createElement('div');
            wrap.className = 'zigzag-wrap';
            // SVG zigzag pattern
            var svgNS = 'http://www.w3.org/2000/svg';
            var svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('viewBox', '0 0 800 30');
            svg.setAttribute('preserveAspectRatio', 'none');

            // Top zigzag
            var points1 = '';
            for (var x = 0; x <= 800; x += 20) {
                var y = (x % 40 === 0) ? 0 : 10;
                points1 += x + ',' + y + ' ';
            }
            points1 += '800,0 0,0';
            var poly1 = document.createElementNS(svgNS, 'polygon');
            poly1.setAttribute('points', points1);
            poly1.setAttribute('fill', '#1a7a3a');
            svg.appendChild(poly1);

            // Middle band
            var rect = document.createElementNS(svgNS, 'rect');
            rect.setAttribute('x', '0');
            rect.setAttribute('y', '8');
            rect.setAttribute('width', '800');
            rect.setAttribute('height', '14');
            rect.setAttribute('fill', '#1a7a3a');
            svg.appendChild(rect);

            // Lighter inner stripes
            for (var sx = 0; sx < 800; sx += 40) {
                var stripe = document.createElementNS(svgNS, 'rect');
                stripe.setAttribute('x', String(sx + 5));
                stripe.setAttribute('y', '10');
                stripe.setAttribute('width', '15');
                stripe.setAttribute('height', '10');
                stripe.setAttribute('fill', '#2d8f4e');
                stripe.setAttribute('transform', 'rotate(-45 ' + (sx + 12) + ' 15)');
                svg.appendChild(stripe);
            }

            // Bottom zigzag
            var points2 = '';
            for (var x2 = 0; x2 <= 800; x2 += 20) {
                var y2 = (x2 % 40 === 0) ? 30 : 20;
                points2 += x2 + ',' + y2 + ' ';
            }
            points2 += '800,30 0,30';
            var poly2 = document.createElementNS(svgNS, 'polygon');
            poly2.setAttribute('points', points2);
            poly2.setAttribute('fill', '#1a7a3a');
            svg.appendChild(poly2);

            wrap.appendChild(svg);
            return wrap;
        }

        function createVoucher(type, code) {
            var voucher = document.createElement('div');
            voucher.className = 'voucher';

            var img = document.createElement('img');
            img.src = IMAGES[type];
            img.alt = 'Bon cadeau Coco Games';
            voucher.appendChild(img);

            var encart = document.createElement('div');
            encart.className = 'barcode-encart';

            var inner = document.createElement('div');
            inner.className = 'barcode-inner';

            var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            inner.appendChild(svg);
            encart.appendChild(inner);
            voucher.appendChild(encart);

            JsBarcode(svg, code, {
                format: 'CODE128',
                width: 1,
                height: 32,
                displayValue: true,
                fontSize: 8,
                font: 'monospace',
                margin: 2,
                background: 'transparent',
                lineColor: '#000000'
            });

            return voucher;
        }

        function updateModeUI() {
            var mode = document.getElementById('mode').value;
            var labelRows = document.querySelectorAll('.label-only');
            for (var i = 0; i < labelRows.length; i++) {
                var isBtn = labelRows[i].tagName === 'BUTTON';
                labelRows[i].style.display = (mode === 'labels') ? (isBtn ? 'inline-block' : 'flex') : 'none';
            }
            var typeSelect = document.getElementById('bon-type');
            var opts = typeSelect.querySelectorAll('option[data-labels-only]');
            for (var j = 0; j < opts.length; j++) {
                opts[j].hidden = (mode !== 'labels');
                opts[j].disabled = (mode !== 'labels');
            }
            if (mode !== 'labels' && typeSelect.selectedOptions[0] && typeSelect.selectedOptions[0].hasAttribute('data-labels-only')) {
                typeSelect.value = '1H';
            }
        }

        function downloadLabelsPng() {
            var labels = document.querySelectorAll('#pages .label');
            if (!labels.length) { alert('Generez d\'abord les etiquettes.'); return; }

            var wMm = parseInt(document.getElementById('label-w').value) || 50;
            var hMm = parseInt(document.getElementById('label-h').value) || 30;
            // 300 DPI : 1 mm = 11.811 px
            var dpi = 300;
            var pxPerMm = dpi / 25.4;
            var pxW = Math.round(wMm * pxPerMm);
            var pxH = Math.round(hMm * pxPerMm);

            var done = 0;
            labels.forEach(function(labelEl, idx) {
                var svgEl = labelEl.querySelector('svg');
                var title = labelEl.querySelector('.label-title').textContent;
                var barcodeText = svgEl.querySelector('text') ? svgEl.querySelector('text').textContent : ('label-' + (idx + 1));

                // Canvas blanc
                var canvas = document.createElement('canvas');
                canvas.width = pxW;
                canvas.height = pxH;
                var ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(0, 0, pxW, pxH);

                // Titre
                ctx.fillStyle = '#000000';
                ctx.font = 'bold ' + Math.round(3.2 * pxPerMm) + 'px Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                var titleY = Math.round(1 * pxPerMm);
                ctx.fillText(title, pxW / 2, titleY);

                // Serialiser SVG du code-barres
                var svgClone = svgEl.cloneNode(true);
                svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
                var svgStr = new XMLSerializer().serializeToString(svgClone);
                var svgBlob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
                var url = URL.createObjectURL(svgBlob);

                var img = new Image();
                img.onload = function() {
                    var barcodeTop = titleY + Math.round(4 * pxPerMm);
                    var barcodeAvailH = pxH - barcodeTop - Math.round(1 * pxPerMm);
                    var barcodeW = Math.round(pxW * 0.92);
                    var barcodeX = Math.round((pxW - barcodeW) / 2);
                    ctx.drawImage(img, barcodeX, barcodeTop, barcodeW, barcodeAvailH);
                    URL.revokeObjectURL(url);

                    canvas.toBlob(function(blob) {
                        var a = document.createElement('a');
                        a.href = URL.createObjectURL(blob);
                        a.download = barcodeText + '.png';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        setTimeout(function() { URL.revokeObjectURL(a.href); }, 1000);
                        done++;
                    }, 'image/png');
                };
                img.src = url;
            });
        }

        function createLabel(code, widthMm, heightMm, title) {
            var label = document.createElement('div');
            label.className = 'label';
            label.style.width = widthMm + 'mm';
            label.style.height = heightMm + 'mm';

            var titleEl = document.createElement('div');
            titleEl.className = 'label-title';
            titleEl.textContent = title;
            titleEl.style.fontFamily = '-apple-system, Arial, sans-serif';
            titleEl.style.fontWeight = '700';
            titleEl.style.fontSize = '3mm';
            titleEl.style.color = '#000';
            titleEl.style.textAlign = 'center';
            titleEl.style.width = '100%';
            titleEl.style.marginBottom = '0.5mm';
            label.appendChild(titleEl);

            var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            label.appendChild(svg);

            var barHeight = Math.max(25, Math.round(heightMm * 1.6));
            var barWidth = Math.max(1, Math.min(2, widthMm / 40));

            JsBarcode(svg, code, {
                format: 'CODE128',
                width: barWidth,
                height: barHeight,
                displayValue: true,
                fontSize: 13,
                font: 'monospace',
                textMargin: 1,
                margin: 2,
                background: 'transparent',
                lineColor: '#000000'
            });

            return label;
        }

        function generate() {
            var mode = document.getElementById('mode').value;
            var type = document.getElementById('bon-type').value;
            var count = parseInt(document.getElementById('count').value) || 4;
            var prefix = document.getElementById('prefix').value.trim() || 'CG';
            var container = document.getElementById('pages');
            container.textContent = '';

            if (mode === 'labels') {
                var wMm = parseInt(document.getElementById('label-w').value) || 40;
                var hMm = parseInt(document.getElementById('label-h').value) || 30;
                var startIdx = parseInt(document.getElementById('start-index').value) || 1;

                var sheet = document.createElement('div');
                sheet.className = 'label-sheet';
                var title = LABELS[type] || 'Bon cadeau';
                for (var i = 0; i < count; i++) {
                    var code = generateCode(prefix, type, startIdx + i);
                    sheet.appendChild(createLabel(code, wMm, hMm, title));
                }
                container.appendChild(sheet);

                // Ajuste @page pour que chaque etiquette tienne sur une page imprimante
                var styleId = 'label-page-size';
                var old = document.getElementById(styleId);
                if (old) old.remove();
                var style = document.createElement('style');
                style.id = styleId;
                style.textContent = '@media print { @page { size: ' + wMm + 'mm ' + hMm + 'mm; margin: 0; } body { margin: 0; } }';
                document.head.appendChild(style);
                return;
            }

            var perPage = 4;
            var totalPages = Math.ceil(count / perPage);

            for (var p = 0; p < totalPages; p++) {
                var page = document.createElement('div');
                page.className = 'page';

                page.appendChild(createZigzag());

                var start = p * perPage;
                var end = Math.min(start + perPage, count);

                for (var i = start; i < end; i++) {
                    var code = generateCode(prefix, type, i + 1);
                    page.appendChild(createVoucher(type, code));
                    page.appendChild(createZigzag());
                }
                container.appendChild(page);
            }
        }
    </script>
</body>
</html>
